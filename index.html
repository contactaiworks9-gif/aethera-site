<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>AETHERA — Luxury Interiors</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

/* GLOBAL */

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html{
scroll-behavior:smooth;
}

body{
background:#0b0b0b;
color:#eae7e2;
font-family:Inter, sans-serif;
overflow-x:hidden;
line-height:1.6;
}

/* NAV */

nav{
position:fixed;
top:0;
left:0;
width:100%;
padding:25px 6vw;
display:flex;
justify-content:space-between;
align-items:center;
z-index:1000;
background:linear-gradient(to bottom,rgba(0,0,0,0.85),transparent);
backdrop-filter:blur(10px);
}

.logo{
font-family:"Cormorant Garamond";
font-size:28px;
letter-spacing:6px;
}

nav ul{
display:flex;
gap:40px;
list-style:none;
font-size:12px;
letter-spacing:3px;
}

nav li{
cursor:pointer;
transition:.3s;
}

nav li:hover{
color:#c9a96e;
}

/* HERO */

.hero{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
position:relative;
}

.hero img{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
z-index:-1;
filter:brightness(.6);
}

.hero h1{
font-family:"Cormorant Garamond";
font-size:clamp(60px,12vw,160px);
letter-spacing:10px;
font-weight:300;
}

.hero p{
margin-top:20px;
letter-spacing:6px;
font-size:12px;
color:#c9a96e;
}

/* SECTION */

section{
padding:120px 8vw;
max-width:1600px;
margin:auto;
}

.section-title{
font-family:"Cormorant Garamond";
font-size:50px;
font-weight:300;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:40px;
margin-top:60px;
}

.card{
overflow:hidden;
position:relative;
cursor:pointer;
}

.card img{
width:100%;
height:380px;
object-fit:cover;
transition:1.2s;
}

.card:hover img{
transform:scale(1.08);
}

.card h3{
margin-top:14px;
font-family:"Cormorant Garamond";
font-size:24px;
font-weight:400;
}

/* GALLERY */

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:12px;
margin-top:50px;
}

.gallery img{
width:100%;
height:260px;
object-fit:cover;
transition:1s;
cursor:pointer;
}

.gallery img:hover{
transform:scale(1.08);
filter:brightness(.85);
}

/* CONTACT */

.contact{
text-align:center;
max-width:700px;
margin:auto;
}

.contact input,
.contact textarea{

width:100%;
padding:16px;
margin-top:20px;
background:transparent;
border:1px solid #333;
color:white;
font-size:14px;
transition:.3s;
}

.contact input:focus,
.contact textarea:focus{

outline:none;
border-color:#c9a96e;

}

button{

margin-top:30px;
padding:16px 40px;
background:#c9a96e;
border:none;
letter-spacing:3px;
cursor:pointer;
transition:.3s;
font-weight:500;
}

button:hover{

background:#e0c48c;
transform:translateY(-3px);

}

/* FOOTER */

footer{

padding:60px;
text-align:center;
border-top:1px solid #222;
margin-top:100px;
font-size:13px;
color:#aaa;

}

/* MOBILE MENU */

.menu-toggle{

display:none;
font-size:26px;
cursor:pointer;

}

/* MOBILE RESPONSIVE */

@media (max-width:900px){

nav ul{
display:none;
position:absolute;
top:80px;
right:0;
background:#0b0b0b;
flex-direction:column;
padding:40px;
gap:30px;
width:200px;
}

nav ul.active{
display:flex;
}

.menu-toggle{
display:block;
}

.hero p{
font-size:10px;
letter-spacing:4px;
}

.section-title{
font-size:36px;
}

section{
padding:90px 6vw;
}

}

/* FADE ANIMATION */

.fade{

opacity:0;
transform:translateY(40px);
transition:1.2s;

}

.fade.visible{

opacity:1;
transform:translateY(0);

}

</style>

</head>

<body>

<nav>

<div class="logo">AETHERA</div>

<div class="menu-toggle" id="menuBtn">☰</div>

<ul id="menu">
<li>COLLECTIONS</li>
<li>SHOWROOM</li>
<li>PHILOSOPHY</li>
<li>ATELIER</li>
</ul>

</nav>

<!-- HERO -->

<div class="hero">

<img loading="lazy" src="https://images.unsplash.com/photo-1618221195710-dd6b41faaea6?w=2400">

<div>
<h1>AETHERA</h1>
<p>WHERE ARCHITECTURE MEETS LUXURY</p>
</div>

</div>

<!-- ICONIC DESIGNS -->

<section>

<h2 class="section-title fade">Iconic Designs</h2>

<div class="grid">

<div class="card fade">
<img loading="lazy" src="https://images.unsplash.com/photo-1631679706909-1844bbd07221?w=800">
<h3>Aura Sofa</h3>
</div>

<div class="card fade">
<img loading="lazy" src="https://images.unsplash.com/photo-1592580136003-fdf0d6f44c30?w=800">
<h3>Obsidian Table</h3>
</div>

<div class="card fade">
<img loading="lazy" src="https://images.unsplash.com/photo-1560448075-bb485b1f98d0?w=800">
<h3>Lumina Chandelier</h3>
</div>

<div class="card fade">
<img loading="lazy" src="https://images.unsplash.com/photo-1505693416388-ac5ce068fe85?w=800">
<h3>Elysium Bed</h3>
</div>

</div>

</section>

<!-- GALLERY -->

<section>

<h2 class="section-title fade">Gallery</h2>

<div class="gallery">

<img loading="lazy" src="https://images.unsplash.com/photo-1616594039964-ae9021a400a0?w=800">
<img loading="lazy" src="https://images.unsplash.com/photo-1555041469-a586c61ea9bc?w=800">
<img loading="lazy" src="https://images.unsplash.com/photo-1493663284031-b7e3aefcae8e?w=800">
<img loading="lazy" src="https://images.unsplash.com/photo-1537726235470-8504e3beef77?w=800">
<img loading="lazy" src="https://images.unsplash.com/photo-1586023492125-27b2c045efd7?w=800">
<img loading="lazy" src="https://images.unsplash.com/photo-1560448075-bb485b1f98d0?w=800">
<img loading="lazy" src="https://images.unsplash.com/photo-1600210492493-0946911123ea?w=800">
<img loading="lazy" src="https://images.unsplash.com/photo-1524758631624-e2822e304c36?w=800">

</div>

</section>

<!-- CONTACT -->

<section class="contact">

<h2 class="section-title fade">Bespoke Inquiry</h2>

<input placeholder="Name">

<input placeholder="Email">

<textarea rows="6" placeholder="Tell us about your project"></textarea>

<button>SUBMIT</button>

</section>

<footer>

© 2026 AETHERA DESIGN

</footer>

<script>

/* MOBILE MENU */

const menuBtn = document.getElementById("menuBtn")
const menu = document.getElementById("menu")

menuBtn.addEventListener("click",()=>{
menu.classList.toggle("active")
})

/* SCROLL ANIMATION */

const observer = new IntersectionObserver(entries=>{

entries.forEach(entry=>{

if(entry.isIntersecting){

entry.target.classList.add("visible")

}

})

},{threshold:.2})

document.querySelectorAll(".fade").forEach(el=>observer.observe(el))

/* PARALLAX HERO */

window.addEventListener("scroll",()=>{

const hero = document.querySelector(".hero img")
const scroll = window.scrollY

hero.style.transform = "translateY(" + scroll*0.3 + "px)"

})

</script>

</body>
</html>
