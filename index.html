<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>AETHERA — Luxury Interiors</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#0b0b0b;
color:#eae7e2;
font-family:Inter;
overflow-x:hidden;
}

/* NAV */

nav{
position:fixed;
top:0;
width:100%;
padding:30px 80px;
display:flex;
justify-content:space-between;
z-index:100;
background:linear-gradient(to bottom,rgba(0,0,0,0.7),transparent);
}

.logo{
font-family:"Cormorant Garamond";
font-size:28px;
letter-spacing:6px;
}

nav ul{
display:flex;
gap:40px;
list-style:none;
font-size:13px;
letter-spacing:3px;
}

/* HERO */

.hero{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
position:relative;
}

.hero img{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
z-index:-1;
filter:brightness(.6);
}

.hero h1{
font-family:"Cormorant Garamond";
font-size:13vw;
letter-spacing:10px;
font-weight:300;
}

.hero p{
margin-top:20px;
letter-spacing:6px;
font-size:12px;
color:#c9a96e;
}

/* SECTION */

section{
padding:120px 10%;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:40px;
margin-top:60px;
}

.card{
overflow:hidden;
position:relative;
}

.card img{
width:100%;
height:400px;
object-fit:cover;
transition:1.2s;
}

.card:hover img{
transform:scale(1.1);
}

.card h3{
margin-top:14px;
font-family:"Cormorant Garamond";
font-size:24px;
}

/* GALLERY */

.gallery{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
margin-top:50px;
}

.gallery img{
width:100%;
height:300px;
object-fit:cover;
transition:1s;
}

.gallery img:hover{
transform:scale(1.1);
}

/* CONTACT */

.contact{
text-align:center;
}

input,textarea{
width:100%;
padding:16px;
margin-top:20px;
background:transparent;
border:1px solid #333;
color:white;
}

button{
margin-top:30px;
padding:16px 40px;
background:#c9a96e;
border:none;
letter-spacing:3px;
cursor:pointer;
}

/* FOOTER */

footer{
padding:60px;
text-align:center;
border-top:1px solid #222;
margin-top:100px;
}

</style>

</head>

<body>

<nav>

<div class="logo">AETHERA</div>

<ul>
<li>COLLECTIONS</li>
<li>SHOWROOM</li>
<li>PHILOSOPHY</li>
<li>ATELIER</li>
</ul>

</nav>


<div class="hero">

<img src="https://images.unsplash.com/photo-1618221195710-dd6b41faaea6?w=2400">

<div>
<h1>AETHERA</h1>
<p>WHERE ARCHITECTURE MEETS LUXURY</p>
</div>

</div>


<section>

<h2 style="font-family:'Cormorant Garamond';font-size:50px;">Iconic Designs</h2>

<div class="grid">

<div class="card">
<img src="https://images.unsplash.com/photo-1631679706909-1844bbd07221?w=800">
<h3>Aura Sofa</h3>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1592580136003-fdf0d6f44c30?w=800">
<h3>Obsidian Table</h3>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1560448075-bb485b1f98d0?w=800">
<h3>Lumina Chandelier</h3>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1505693416388-ac5ce068fe85?w=800">
<h3>Elysium Bed</h3>
</div>

</div>

</section>


<section>

<h2 style="font-family:'Cormorant Garamond';font-size:50px;">Gallery</h2>

<div class="gallery">

<img src="https://images.unsplash.com/photo-1616594039964-ae9021a400a0?w=800">
<img src="https://images.unsplash.com/photo-1555041469-a586c61ea9bc?w=800">
<img src="https://images.unsplash.com/photo-1493663284031-b7e3aefcae8e?w=800">
<img src="https://images.unsplash.com/photo-1537726235470-8504e3beef77?w=800">
<img src="https://images.unsplash.com/photo-1586023492125-27b2c045efd7?w=800">
<img src="https://images.unsplash.com/photo-1560448075-bb485b1f98d0?w=800">
<img src="https://images.unsplash.com/photo-1600210492493-0946911123ea?w=800">
<img src="https://images.unsplash.com/photo-1524758631624-e2822e304c36?w=800">

</div>

</section>


<section class="contact">

<h2 style="font-family:'Cormorant Garamond';font-size:50px;">Bespoke Inquiry</h2>

<input placeholder="Name">

<input placeholder="Email">

<textarea rows="6" placeholder="Tell us about your project"></textarea>

<button>SUBMIT</button>

</section>


<footer>

© 2026 AETHERA DESIGN

</footer>


<script>

window.addEventListener("scroll",()=>{

document.querySelectorAll(".card img").forEach(img=>{

const speed=0.2
const y=window.scrollY*speed
img.style.transform="translateY("+y+"px)"

})

})

</script>

</body>
</html>
